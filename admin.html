<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – MHC Vitals</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--navy:#1a2b4a;--teal:#3aafa9;--teal-light:#52c5bf;--teal-dark:#2a8f8a;--off:#f4f8f7;--slate:#5a6a7a;--amber:#f59e0b;--emerald:#22c55e;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--off);color:var(--navy);min-height:100vh;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* LOGIN */
  .login-screen{min-height:100vh;background:linear-gradient(160deg,var(--navy) 0%,#1e3a5f 55%,var(--teal-dark) 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
  .login-screen::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(58,175,169,0.14) 0%,transparent 68%);}
  .login-box{background:white;border-radius:28px;padding:48px 44px;max-width:420px;width:92%;box-shadow:0 30px 80px rgba(26,43,74,0.35);text-align:center;position:relative;}
  .login-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px;}
  .login-logo .mhc{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--navy);}
  .login-logo .vitals{font-size:10px;font-weight:600;color:var(--teal);letter-spacing:3px;text-transform:uppercase;}
  .login-badge{display:inline-block;background:rgba(58,175,169,0.1);color:var(--teal-dark);border:1px solid rgba(58,175,169,0.3);border-radius:50px;padding:4px 16px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;}
  .login-box h2{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;color:var(--navy);margin-bottom:8px;}
  .login-box p{font-size:13.5px;color:var(--slate);margin-bottom:28px;}
  .pw-wrap{position:relative;margin-bottom:12px;}
  .pw-wrap input{width:100%;padding:14px 44px 14px 16px;border-radius:12px;border:1.5px solid rgba(26,43,74,0.13);font-family:'DM Sans',sans-serif;font-size:16px;color:var(--navy);background:var(--off);outline:none;transition:border-color 0.2s;text-align:center;letter-spacing:3px;}
  .pw-wrap input:focus{border-color:var(--teal);background:white;}
  .pw-wrap input::placeholder{letter-spacing:1px;font-size:14px;color:#aaa;}
  .pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--slate);font-size:16px;background:none;border:none;}
  .login-btn{width:100%;padding:14px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:white;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;box-shadow:0 6px 22px rgba(58,175,169,0.32);transition:all 0.2s;}
  .login-btn:hover{transform:translateY(-1px);box-shadow:0 9px 28px rgba(58,175,169,0.44);}
  .login-err{color:#ef4444;font-size:13px;margin-top:10px;display:none;}

  /* DASHBOARD */
  .dashboard{display:none;min-height:100vh;}
  .dashboard.on{display:block;}
  .dnav{background:var(--navy);padding:0 5%;height:64px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 20px rgba(0,0,0,0.2);position:sticky;top:0;z-index:50;}
  .dnav-logo .mhc{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:white;}
  .dnav-logo .vitals{font-size:9px;font-weight:600;color:var(--teal);letter-spacing:3px;text-transform:uppercase;}
  .dnav-right{display:flex;align-items:center;gap:14px;}
  .dnav-badge{background:rgba(58,175,169,0.2);color:var(--teal-light);border:1px solid rgba(58,175,169,0.3);padding:4px 12px;border-radius:50px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
  .dnav-mode{font-size:11px;font-weight:600;padding:4px 12px;border-radius:50px;}
  .dnav-mode.live{background:rgba(34,197,94,0.2);color:#86efac;}
  .dnav-mode.local{background:rgba(245,158,11,0.2);color:#fcd34d;}
  .back-link{color:rgba(255,255,255,0.5);text-decoration:none;font-size:13px;transition:color 0.2s;}
  .back-link:hover{color:white;}
  .logout-btn{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all 0.2s;}
  .logout-btn:hover{background:rgba(255,255,255,0.18);color:white;}

  /* STATS */
  .stats-bar{background:white;border-bottom:1px solid rgba(58,175,169,0.1);padding:18px 5%;display:flex;gap:20px;flex-wrap:wrap;}
  .stat{display:flex;align-items:center;gap:10px;}
  .stat-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .stat-ico.all{background:rgba(58,175,169,0.12);}.stat-ico.hold{background:rgba(245,158,11,0.12);}.stat-ico.conf{background:rgba(34,197,94,0.12);}
  .stat-n{font-size:22px;font-weight:700;color:var(--navy);line-height:1;}
  .stat-lbl{font-size:11px;color:var(--slate);font-weight:500;}
  .stats-refresh{margin-left:auto;display:flex;align-items:center;gap:8px;}
  .refresh-btn{padding:8px 16px;border-radius:8px;border:1.5px solid rgba(58,175,169,0.25);background:white;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--teal-dark);font-weight:600;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
  .refresh-btn:hover{background:var(--teal);color:white;border-color:var(--teal);}
  .last-refresh{font-size:11px;color:var(--slate);}

  /* MAIN */
  .dash-main{max-width:1100px;margin:0 auto;padding:28px 5%;}
  .filter-tabs{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap;align-items:center;}
  .ftab{padding:9px 22px;border-radius:50px;border:1.5px solid rgba(26,43,74,0.12);background:white;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--slate);transition:all 0.2s;box-shadow:0 2px 8px rgba(26,43,74,0.05);}
  .ftab.active{background:var(--teal);border-color:var(--teal);color:white;font-weight:600;}
  .ftab:not(.active):hover{border-color:var(--teal);color:var(--teal);}
  .mf{margin-left:auto;padding:8px 14px;border-radius:8px;border:1.5px solid rgba(26,43,74,0.12);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--navy);background:white;outline:none;cursor:pointer;}

  /* CARDS */
  .blist{display:flex;flex-direction:column;gap:12px;}
  .bcard{background:white;border-radius:16px;padding:20px 22px;border:1px solid rgba(26,43,74,0.08);box-shadow:0 3px 16px rgba(26,43,74,0.06);display:grid;grid-template-columns:1.4fr 1.4fr 0.8fr auto;gap:14px;align-items:center;transition:box-shadow 0.2s;border-left:4px solid transparent;}
  .bcard:hover{box-shadow:0 6px 24px rgba(26,43,74,0.1);}
  .bcard.hold{border-left-color:var(--amber);}
  .bcard.confirmed{border-left-color:var(--emerald);}
  .bc-name{font-weight:600;font-size:15px;color:var(--navy);}
  .bc-det{font-size:12px;color:var(--slate);margin-top:3px;}
  .bc-date{font-size:13px;color:var(--navy);font-weight:500;}
  .bc-time{font-size:12px;color:var(--slate);margin-top:2px;}
  .bc-tok{font-size:11px;color:rgba(26,43,74,0.3);font-weight:600;letter-spacing:0.5px;margin-top:5px;}
  .sbadge{padding:5px 14px;border-radius:50px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;}
  .sbadge.hold{background:rgba(245,158,11,0.12);color:#92400e;border:1px solid rgba(245,158,11,0.3);}
  .sbadge.confirmed{background:rgba(34,197,94,0.12);color:#166534;border:1px solid rgba(34,197,94,0.3);}
  .bc-acts{display:flex;flex-direction:column;gap:7px;}
  .abtn{padding:8px 14px;border-radius:9px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:600;transition:all 0.2s;width:100%;}
  .abtn.ok{background:rgba(34,197,94,0.12);color:#166534;border:1px solid rgba(34,197,94,0.3);}
  .abtn.ok:hover{background:var(--emerald);color:white;border-color:var(--emerald);}
  .abtn.rm{background:rgba(239,68,68,0.1);color:#991b1b;border:1px solid rgba(239,68,68,0.25);}
  .abtn.rm:hover{background:#ef4444;color:white;border-color:#ef4444;}
  .abtn:disabled{opacity:0.5;cursor:not-allowed;}

  .empty{text-align:center;padding:60px 20px;color:var(--slate);}
  .empty .ico{font-size:40px;margin-bottom:12px;}
  .loading-state{display:flex;align-items:center;justify-content:center;gap:12px;padding:60px;color:var(--slate);font-size:15px;}
  .loading-state .sp{width:24px;height:24px;border:3px solid rgba(58,175,169,0.2);border-top-color:var(--teal);border-radius:50%;animation:spin 0.7s linear infinite;}

  .toast{position:fixed;bottom:22px;right:22px;background:var(--navy);color:white;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:500;border-left:4px solid var(--teal);box-shadow:0 8px 28px rgba(0,0,0,0.22);z-index:300;transform:translateY(80px);opacity:0;transition:all 0.3s;}
  .toast.on{transform:translateY(0);opacity:1;}

  @media(max-width:780px){.bcard{grid-template-columns:1fr 1fr;}.bc-acts{grid-column:1/-1;flex-direction:row;}}
  @media(max-width:500px){.bcard{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <img src="logo.jpg" alt="MHC Vitals Logo" style="width:52px;height:52px;border-radius:50%;object-fit:cover;">
      <div><div class="mhc">MHC</div><div class="vitals">VITALS</div></div>
    </div>
    <div class="login-badge">Admin Panel</div>
    <h2>Appointment<br>Management</h2>
    <p>Enter your admin password to manage bookings</p>
    <div class="pw-wrap">
      <input type="password" id="passInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()">
      <button class="pw-eye" onclick="togglePw()" id="eyeBtn">👁</button>
    </div>
    <button class="login-btn" onclick="login()">Access Dashboard →</button>
    <div class="login-err" id="loginErr">Incorrect password. Please try again.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="dnav">
    <div class="dnav-logo">
      <img src="logo.jpg" alt="MHC Vitals Logo" style="width:44px;height:44px;border-radius:50%;object-fit:cover;">
      <div class="dnav-logo" style="gap:8px"><div><div class="mhc">MHC Vitals</div><div class="vitals">Admin Dashboard</div></div></div>
    </div>
    <div class="dnav-right">
      <div class="dnav-badge">🔐 Admin</div>
      <div class="dnav-mode" id="modeIndicator">⏳ Connecting...</div>
      <a href="index.html" class="back-link">← Main Site</a>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="loading-state"><div class="sp"></div>Loading bookings...</div>
    <div class="stats-refresh">
      <span class="last-refresh" id="lastRefresh"></span>
      <button class="refresh-btn" onclick="refreshData()">🔄 Refresh</button>
    </div>
  </div>

  <div class="dash-main">
    <div class="filter-tabs">
      <button class="ftab active" onclick="setF('all',this)">All Bookings</button>
      <button class="ftab" onclick="setF('hold',this)">On Hold</button>
      <button class="ftab" onclick="setF('confirmed',this)">Confirmed</button>
      <select class="mf" id="mf" onchange="renderDash()">
        <option value="">All Months</option>
        <!-- options injected by JS below -->
      </select>
    </div>
    <div class="blist" id="bList"><div class="loading-state"><div class="sp"></div>Loading...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// 🔧 PASTE YOUR GOOGLE APPS SCRIPT URL HERE
const SCRIPT_URL = ""; // e.g. "https://script.google.com/macros/s/ABC.../exec"
const ADMIN_PW = "mhcadmin2025"; // Must match what's in google-apps-script.js

const SK='mhcv3';

// Dynamic months — always current + next month, works forever
const MONTHS_FILTER = (()=>{
  const now = new Date();
  return [0,1].map(offset=>{
    const d = new Date(now.getFullYear(), now.getMonth()+offset, 1);
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const lbl = d.toLocaleString('en-IN',{month:'long',year:'numeric'});
    return {value:`${y}-${m}`, label:lbl};
  });
})();

// Populate month filter dropdown
window.addEventListener('DOMContentLoaded',()=>{
  const sel = document.getElementById('mf');
  if(sel){
    MONTHS_FILTER.forEach(mo=>{
      const opt = document.createElement('option');
      opt.value = mo.value;
      opt.textContent = mo.label;
      sel.appendChild(opt);
    });
  }
});
const SLOTS=[{id:'AM',lbl:'11:00 AM – 12:00 PM'},{id:'PM1',lbl:'5:00 PM – 6:00 PM'},{id:'PM2',lbl:'6:00 PM – 7:00 PM'}];
const LIVE=!!SCRIPT_URL;
let curF='all', allBookings=[], pwVisible=false;

const getLocal=()=>{try{return JSON.parse(localStorage.getItem(SK))||[];}catch{return[];}};
const saveLocal=d=>localStorage.setItem(SK,JSON.stringify(d));
const slotLbl=id=>SLOTS.find(s=>s.id===id)?.lbl||id;
const fmtD=ds=>{const[y,m,d]=ds.split('-').map(Number);return new Date(y,m-1,d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});};

async function api(data){
  const r=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({...data,adminPassword:ADMIN_PW})});
  return r.json();
}

function togglePw(){
  pwVisible=!pwVisible;
  document.getElementById('passInput').type=pwVisible?'text':'password';
  document.getElementById('eyeBtn').textContent=pwVisible?'🙈':'👁';
}

async function login(){
  const p=document.getElementById('passInput').value;
  const err=document.getElementById('loginErr');
  if(p!==ADMIN_PW){err.style.display='block';document.getElementById('passInput').value='';document.getElementById('passInput').focus();return;}
  err.style.display='none';
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('dashboard').classList.add('on');
  // Set mode indicator
  const mi=document.getElementById('modeIndicator');
  if(LIVE){mi.textContent='🟢 Google Sheets';mi.className='dnav-mode live';}
  else{mi.textContent='🟡 Local Mode';mi.className='dnav-mode local';}
  await refreshData();
}

function logout(){
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('dashboard').classList.remove('on');
  document.getElementById('passInput').value='';
  document.getElementById('loginErr').style.display='none';
}

async function refreshData(){
  document.getElementById('bList').innerHTML='<div class="loading-state"><div class="sp"></div>Loading bookings...</div>';
  if(LIVE){
    try{
      const r=await api({action:'getAll'});
      if(r.ok){allBookings=r.bookings||[];}
      else{allBookings=getLocal();}
    }catch(e){allBookings=getLocal();}
  }else{
    allBookings=getLocal().map(b=>({...b,id:b.id||b.token})).reverse();
  }
  document.getElementById('lastRefresh').textContent='Updated: '+new Date().toLocaleTimeString('en-IN');
  renderStats();
  renderDash();
}

function renderStats(){
  const all=allBookings.length;
  const hold=allBookings.filter(b=>b.status==='hold').length;
  const conf=allBookings.filter(b=>b.status==='confirmed').length;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat"><div class="stat-ico all">📋</div><div><div class="stat-n">${all}</div><div class="stat-lbl">Total Bookings</div></div></div>
    <div class="stat"><div class="stat-ico hold">⏳</div><div><div class="stat-n">${hold}</div><div class="stat-lbl">On Hold</div></div></div>
    <div class="stat"><div class="stat-ico conf">✅</div><div><div class="stat-n">${conf}</div><div class="stat-lbl">Confirmed</div></div></div>
    <div class="stats-refresh">
      <span class="last-refresh" id="lastRefresh">Updated: ${new Date().toLocaleTimeString('en-IN')}</span>
      <button class="refresh-btn" onclick="refreshData()">🔄 Refresh</button>
    </div>
  `;
}

function setF(f,btn){curF=f;document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');renderDash();}

function renderDash(){
  let data=[...allBookings];
  const mo=document.getElementById('mf').value;
  if(curF!=='all')data=data.filter(b=>b.status===curF);
  if(mo)data=data.filter(b=>b.date&&b.date.startsWith(mo));
  const el=document.getElementById('bList');
  if(!data.length){el.innerHTML=`<div class="empty"><div class="ico">📭</div><p>No bookings found for selected filter.</p></div>`;return;}
  el.innerHTML=data.map(b=>`
    <div class="bcard ${b.status}" id="bc-${b.id}">
      <div>
        <div class="bc-name">${b.name||'—'}</div>
        <div class="bc-det">📞 ${b.phone||'—'}</div>
        <div class="bc-det">✉️ ${b.email||'—'}</div>
        ${b.reason?`<div class="bc-det">📌 ${b.reason}</div>`:''}
        <div class="bc-tok">🎫 ${b.id}</div>
      </div>
      <div>
        <div class="bc-date">📅 ${b.date?fmtD(b.date):'—'}</div>
        <div class="bc-time">🕐 ${slotLbl(b.slot)}</div>
        ${b.message?`<div class="bc-det" style="margin-top:6px;font-style:italic">"${String(b.message).substring(0,60)}${String(b.message).length>60?'…':''}"</div>`:''}
        <div class="bc-det" style="margin-top:6px">Requested: ${b.at?new Date(b.at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):''}</div>
      </div>
      <div><div class="sbadge ${b.status}">${b.status==='hold'?'🟡 On Hold':'🟢 Confirmed'}</div></div>
      <div class="bc-acts">
        ${b.status==='hold'?`<button class="abtn ok" id="ok-${b.id}" onclick="confirmB('${b.id}')">✓ Confirm</button>`:''}
        <button class="abtn rm" id="rm-${b.id}" onclick="removeB('${b.id}')">✕ Remove</button>
      </div>
    </div>
  `).join('');
}

async function confirmB(id){
  const okBtn=document.getElementById('ok-'+id);
  const rmBtn=document.getElementById('rm-'+id);
  if(okBtn){okBtn.disabled=true;okBtn.textContent='Confirming...';}
  if(rmBtn)rmBtn.disabled=true;

  if(LIVE){
    try{
      const r=await api({action:'confirm',token:id});
      if(!r.ok){toast('Error: '+(r.error||'Failed'));if(okBtn){okBtn.disabled=false;okBtn.textContent='✓ Confirm';}if(rmBtn)rmBtn.disabled=false;return;}
    }catch(e){toast('Connection error');if(okBtn){okBtn.disabled=false;okBtn.textContent='✓ Confirm';}if(rmBtn)rmBtn.disabled=false;return;}
  }else{
    const bs=getLocal();const i=bs.findIndex(b=>b.id===id);
    if(i>-1){bs[i].status='confirmed';saveLocal(bs);}
  }

  const i=allBookings.findIndex(b=>b.id===id);
  if(i>-1)allBookings[i].status='confirmed';
  renderStats();renderDash();toast('✅ Booking confirmed! Student notified by email.');
}

async function removeB(id){
  if(!confirm('Remove this booking permanently?'))return;
  const rmBtn=document.getElementById('rm-'+id);
  if(rmBtn){rmBtn.disabled=true;rmBtn.textContent='Removing...';}

  if(LIVE){
    try{
      const r=await api({action:'remove',token:id});
      if(!r.ok){toast('Error: '+(r.error||'Failed'));if(rmBtn){rmBtn.disabled=false;rmBtn.textContent='✕ Remove';}return;}
    }catch(e){toast('Connection error');if(rmBtn){rmBtn.disabled=false;rmBtn.textContent='✕ Remove';}return;}
  }else{
    saveLocal(getLocal().filter(b=>b.id!==id));
  }

  allBookings=allBookings.filter(b=>b.id!==id);
  renderStats();renderDash();toast('Booking removed.');
}

function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');setTimeout(()=>el.classList.remove('on'),3500);}
</script>
</body>
</html>
